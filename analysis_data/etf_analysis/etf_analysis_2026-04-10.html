<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧺 ETF Analysis @ 2026-04-10</title>
    <style>
        :root {
            --bg: #0b1020;
            --bg2: #111827;
            --card: #151d31;
            --card-soft: #1b2640;
            --text: #e6edf7;
            --muted: #b8c2d9;
            --line: #2a3553;
            --accent: #64b5f6;
            --accent2: #7c4dff;
            --green: #34d399;
            --red: #f87171;
            --yellow: #facc15;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(1200px 600px at 20% -10%, #1f3a8a33, transparent),
                        radial-gradient(900px 500px at 90% 0%, #7c4dff22, transparent),
                        linear-gradient(180deg, var(--bg), var(--bg2));
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 26px;
            background: linear-gradient(180deg, #1a233a, #141c2f);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
        }

        h1 {
            text-align: center;
            font-size: clamp(1.5rem, 2.8vw, 2.2rem);
            color: #ffffff;
            margin: 4px 0 22px;
            letter-spacing: 0.2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
            display: block;
            background: linear-gradient(180deg, #1f2c4a, #1a2642);
            border: 1px solid var(--line);
            border-left: 4px solid var(--accent);
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
        }

        h2, h3 {
            color: #dbe7ff;
            margin-top: 22px;
            margin-bottom: 10px;
        }

        p, li {
            line-height: 1.65;
            color: var(--muted);
        }

        p.description {
            font-size: 1.1em;
            color: #c8d3ea;
            background: var(--card-soft);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px 16px;
        }

        .red_font {
            color: var(--red);
            font-weight: bold;
        }

        .blue_font {
            color: var(--accent);
            font-weight: bold;
        }

        .green_font {
            color: var(--green);
            font-weight: bold;
        }

        .yellow_font {
            color: var(--yellow);
            font-weight: bold;
        }

        .plot {
            margin-top: 26px;
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #0e1629;
            padding: 8px;
        }

        hr {
            border: 0;
            border-top: 1px solid var(--line);
            margin: 22px 0;
        }

        code {
            background: #101a30;
            border: 1px solid #273657;
            color: #d9e5ff;
            border-radius: 6px;
            padding: 0.15em 0.45em;
        }

        pre {
            background: #0f172a;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px;
            overflow-x: auto;
        }

        a, .link_style {
            text-decoration: none;
            color: #c8dbff;
            transition: color 0.2s ease;
        }

        a:visited, .link_style:visited {
            color: #bcd2ff;
        }

        a:hover, .link_style:hover {
            color: #ffffff;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 14px;
                border-radius: 12px;
            }

            h1 {
                font-size: 1.5em;
            }

            p.description {
                font-size: 1em;
            }

            .plot {
                padding: 4px;
            }
        }

        /* floating button */
        .scroll-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            background: linear-gradient(135deg, #4f46e5, #2563eb);
            border: none;
            border-radius: 50%;
            padding: 16px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.35);
            transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }

        .scroll-to-top.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .scroll-to-top:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .scroll-to-top svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 10px 12px;
            border: 1px solid var(--line);
            text-align: center;
        }

        th {
            background: #1d2a45;
            color: #e8efff;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tr:nth-child(even) {
            background-color: #17213a;
        }
    </style>
</head>
